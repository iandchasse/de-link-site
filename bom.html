  { cat:"Resistor",     mpn:"CRGCQ0805F5K6",          desc:"Res 5.6k Ohm 0805",                             mfr:"TE Connectivity",   dk:"A129758CT-ND",                     qty:1,  p:0.11, t:false },
  { cat:"Resistor",     mpn:"RR1220P-103-D",          desc:"Res 10k Ohm 0805, precision",                   mfr:"Susumu",            dk:"RR12P10.0KDCT-ND",                 qty:16, p:0.10, t:true },
  { cat:"Resistor",     mpn:"RMCF0805JT12K0",         desc:"Res 12k Ohm 0805",                              mfr:"Stackpole",         dk:"738-RMCF0805JT12K0CT-ND",          qty:1,  p:0.10, t:false },
  { cat:"Resistor",     mpn:"CRG0805F20K",            desc:"Res 20k Ohm 0805",                              mfr:"TE Connectivity",   dk:"A126349CT-ND",                     qty:1,  p:0.10, t:false },
  { cat:"Resistor",     mpn:"CRGCQ0805F33K",          desc:"Res 33k Ohm 0805",                              mfr:"TE Connectivity",   dk:"A129767CT-ND",                     qty:1,  p:0.10, t:false },
  { cat:"Resistor",     mpn:"RK73B2ATTD563J",         desc:"Res 56k Ohm 0805",                              mfr:"KOA",               dk:"2019-RK73B2ATTD563JCT-ND",         qty:1,  p:0.10, t:true },
  { cat:"Resistor",     mpn:"RC0805FR-1368KL",        desc:"Res 68k Ohm 0805",                              mfr:"Yageo",             dk:"13-RC0805FR-1368KLCT-ND",          qty:1,  p:0.54, t:false },
  { cat:"Resistor",     mpn:"RC0805JR-07100KL",       desc:"Res 100k Ohm 0805",                             mfr:"Yageo",             dk:"311-100KARCT-ND",                  qty:1,  p:0.10, t:true },
];

const FIXED = [
  { label:"Good Display e-paper screen — GDEQ0426T82-FL01C (4.26\", frontlit, recommended)", note:"sourced from Good Display; non-frontlit version available for further savings if skipping frontlight circuit", p:29.59 },
  { label:"LiPo battery, 3.7V (capacity TBD)", note:"estimate — varies by supplier and capacity", p:10.06 },
  { label:"PCB fabrication, 5-piece run (per unit)", note:"estimate based on 5-piece quotes from services such as JLCPCB, PCBWay, and Elecrow", p:24.14 },
  { label:"3D print filament — case + brackets", note:"PLA estimate based on model geometry", p:3.00 },
];

const tbody = document.getElementById('bom-body');
let rowIdx = 0;

function mkRow(cls, cells) {
  rowIdx++;
  const tr = document.createElement('tr');
  tr.className = cls;

  const rh = document.createElement('td');
  rh.className = 'rn';
  rh.textContent = rowIdx;
  tr.appendChild(rh);

  cells.forEach(cell => {
    const td = document.createElement('td');
    td.className = 'c' + (cell.cls ? ' ' + cell.cls : '');
    if (cell.span) td.colSpan = cell.span;
    if (cell.html) td.innerHTML = cell.html;
    else if (cell.text !== undefined) td.textContent = cell.text;
    if (cell.style) td.setAttribute('style', cell.style);
    tr.appendChild(td);
  });

  tbody.appendChild(tr);
}

function $ (n) { return '$' + n.toFixed(2); }

// Row 1: title
mkRow('r-title', [{ html:'de-link pip &mdash; Bill of Materials', span:9, cls:'bold' }]);
// Row 2: subtitle
mkRow('r-sub', [{ html:'Digikey cut-tape pricing, qty 1 per component &bull; prices cached June&nbsp;2026 &bull; excludes: shipping, handling, tariffs', span:9 }]);
// Row 3: blank
mkRow('r-blank', [{ text:'', span:9 }]);

// Row 4: column headers
rowIdx++;
const hdrTr = document.createElement('tr');
hdrTr.className = 'r-hdr';
const hdrs = ['', '#', 'MPN', 'Description', 'Manufacturer', 'DigiKey Part #', 'Qty/Bd', 'Unit Price (1x)', 'x5 Total', 'Tariff'];
hdrs.forEach((h, i) => {
  const td = document.createElement('td');
  if (i === 0) {
    td.className = 'rn';
    td.textContent = rowIdx;
  } else {
    td.className = 'c' + (i >= 7 ? ' r' : '') + (i === 9 ? ' ct' : '');
    td.textContent = h;
  }
  hdrTr.appendChild(td);
});
tbody.appendChild(hdrTr);

// Data rows
let num = 0;
let lastCat = '';
let total1 = 0, total5 = 0;

COMPONENTS.forEach((c, idx) => {
  if (c.cat !== lastCat) {
    lastCat = c.cat;
    mkRow('r-cat', [
      { text:'', },
      { text:c.cat, span:8, cls:'bold' }
    ]);
  }
  num++;
  total1 += c.p * c.qty;
  total5 += c.p * c.qty * 5;
  const rowClass = c.opt === 'fl' ? 'r-fl' : c.opt === 'bp' ? 'r-bp' : (num % 2 === 1) ? 'r-odd' : 'r-even';
  const optBadge = c.opt === 'fl' ? '<span class="opt-fl">&#9654; FL</span>' : c.opt === 'bp' ? '<span class="opt-bp">&#9654; BP</span>' : '';
  mkRow(rowClass, [
    { text:num,    cls:'ct' },
    { text:c.mpn,  cls:'mono' },
    { html: c.desc + optBadge },
    { text:c.mfr },
    { text:c.dk,   cls:'mono blue' },
    { text:c.qty,  cls:'ct' },
    { text:$(c.p), cls:'r' },
    { text:$(c.p * c.qty * 5), cls:'r' },
    { html: c.t ? '<span class="tariff-flag">&#8224;</span>' : '', cls:'ct' },
  ]);
});

// Blank
mkRow('r-blank', [{ text:'', span:9 }]);

// Subtotal
mkRow('r-subtot', [
  { html:'<b>SUBTOTAL</b> &mdash; PCB components (Digikey, qty 1 per component)', span:5, cls:'bold' },
  { text:'', },
  { text:$(total1), cls:'r bold' },
  { text:$(total5), cls:'r bold' },
  { text:'', },
]);

// Fixed items
let fixedTotal = 0;
FIXED.forEach(f => {
  fixedTotal += f.p;
  mkRow('r-fixed', [
    { html:'+ ' + f.label, span:5, style:'padding-left:14px;' },
    { text:'', },
    { text:$(f.p), cls:'r' },
    { html:'<span style="color:#888;font-size:10px;">&#8212; per unit &#8212;</span>', cls:'ct' },
    { text:'', },
  ]);
});

// Grand total per unit
const grand = total1 + fixedTotal;
mkRow('r-total', [
  { html:'<b>ESTIMATED TOTAL</b> &mdash; per unit', span:5 },
  { text:'', },
  { html:'<span style="color:#c05020;font-size:13px;font-weight:bold;">~' + $(grand) + '</span>', cls:'r' },
  { html:'<span style="color:#c05020;font-size:13px;font-weight:bold;">~' + $(grand * 5) + '</span>', cls:'r' },
  { text:'', },
]);
// 5-unit batch total
mkRow('r-total', [
  { html:'<b>ESTIMATED TOTAL</b> &mdash; 5-unit batch (all of the above &times;5)', span:5,
    style:'background:#ffe8d0;' },
  { text:'', style:'background:#ffe8d0;' },
  { html:'<span style="color:#888;font-size:11px;font-style:italic;">per-unit above</span>', cls:'r',
    style:'background:#ffe8d0;' },
  { html:'<span style="color:#a03800;font-size:14px;font-weight:bold;">~' + $(grand * 5) + '</span>', cls:'r',
    style:'background:#ffe8d0;' },
  { text:'', style:'background:#ffe8d0;' },
]);

// Blank
mkRow('r-blank', [{ text:'', span:9 }]);

// Legend row
mkRow('r-blank', [{ text:'', span:9 }]);
mkRow('r-note', [
  { html:'<b>Row legend:</b>&nbsp;&nbsp;'
      + '<span class="legend-box">'
      + '<span><span class="legend-swatch" style="background:#fff4e0;"></span> <span class="opt-fl" style="margin-left:0;">&#9654; FL</span> &mdash; frontlight circuit (optional, ~$5 in components). Skip if using a non-frontlit screen variant.</span>'
      + '&nbsp;&nbsp;&nbsp;'
      + '<span><span class="legend-swatch" style="background:#eef8ee;"></span> <span class="opt-bp" style="margin-left:0;">&#9654; BP</span> &mdash; battery protection (optional, ~$1 in components). Omit only if your battery already includes built-in protection.</span>'
      + '</span>',
    span:9 }
]);

// Notes
mkRow('r-note', [
  { html:'<b>x5 quantity column:</b> ordering 5x each component totals <b>' + $(total5) + '</b>, reflecting the minimum batch most PCBA assembly services require. At this quantity, Digikey unit pricing typically drops by 10-50% per part.',
    span:9 }
]);
mkRow('r-note', [
  { html:'<b>Recommended screen:</b> <b>GDEQ0426T82-FL01C</b> (Good Display, 4.26", 800x480, with frontlight). If you are omitting the frontlight circuit, a non-frontlit variant of the same panel is available at reduced cost.',
    span:9 }
]);
mkRow('r-tariff', [
  { html:'<span class="tariff-flag">&#8224;</span> This part currently has an active US import tariff flag in Digikey\'s system. Prices shown are base pricing without tariff surcharges &mdash; you may see additional charges at checkout.',
    span:9 }
]);

// Status bar
document.getElementById('status-sum').textContent = 'x5 SUM: ' + $(total5);
document.getElementById('status-count').textContent = num + ' components';
</script>

</body>
</html>
