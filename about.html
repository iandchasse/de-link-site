<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="logos/simple-logo-white.svg">
  <title>de-link — about</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
    }

    /* faded PCB render as full-bleed background */
    #bg {
      position: fixed;
      inset: 0;
      background-image: url('img/pcb-render.png');
      background-size: cover;
      background-position: center;
      opacity: 0.13;
      filter: grayscale(0.4);
      pointer-events: none;
    }

    /* Win98 dialog window */
    .dialog {
      position: relative;
      z-index: 1;
      width: 520px;
      max-width: 92vw;
      background: #c0c0c0;
      border: 2px solid;
      border-top-color:    #ffffff;
      border-left-color:   #ffffff;
      border-bottom-color: #808080;
      border-right-color:  #808080;
      box-shadow: 4px 4px 0 #000000;
    }

    /* title bar */
    .titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      padding: 5px 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .titlebar-title {
      color: #ffffff;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .titlebar-btns {
      display: flex;
      gap: 2px;
    }
    .titlebar-btns span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 16px;
      background: #c0c0c0;
      color: #000;
      font-size: 10px;
      font-family: "Courier New", Courier, monospace;
      border: 1px solid;
      border-top-color:    #ffffff;
      border-left-color:   #ffffff;
      border-bottom-color: #808080;
      border-right-color:  #808080;
      cursor: default;
    }

    /* sunken content panel */
    .content-panel {
      margin: 12px;
      background: #c0c0c0;
      border: 2px solid;
      border-top-color:    #808080;
      border-left-color:   #808080;
      border-bottom-color: #ffffff;
      border-right-color:  #ffffff;
      padding: 32px 28px 28px;
      text-align: center;
    }

    .wip-icon {
      font-size: 38px;
      margin-bottom: 12px;
      display: block;
      line-height: 1;
    }

    .wip-heading {
      font-size: 28px;
      font-weight: bold;
      color: #111111;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 14px;
      line-height: 1.1;
    }

    /* etched divider */
    .win-hr {
      border: none;
      border-top: 1px solid #808080;
      border-bottom: 1px solid #ffffff;
      margin: 16px 0;
    }

    .wip-body {
      font-size: 13px;
      color: #333333;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    /* button row */
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .win98-btn {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      background: #c0c0c0;
      color: #111111;
      text-decoration: none;
      border: 2px solid;
      border-top-color:    #ffffff;
      border-left-color:   #ffffff;
      border-bottom-color: #808080;
      border-right-color:  #808080;
      padding: 6px 28px;
      cursor: pointer;
      display: inline-block;
      min-width: 110px;
    }
    .win98-btn:hover   { background: #d4d4d4; }
    .win98-btn:active,
    .win98-btn.pressed {
      border-top-color:    #808080;
      border-left-color:   #808080;
      border-bottom-color: #ffffff;
      border-right-color:  #ffffff;
    }

    /* status bar at bottom */
    .statusbar {
      border-top: 1px solid #808080;
      padding: 3px 8px;
      font-size: 11px;
      color: #444444;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .statusbar-field {
      border: 1px solid;
      border-top-color:    #808080;
      border-left-color:   #808080;
      border-bottom-color: #ffffff;
      border-right-color:  #ffffff;
      padding: 1px 6px;
      flex: 1;
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div class="dialog">

    <div class="titlebar">
      <span class="titlebar-title">de-link.exe — about</span>
      <div class="titlebar-btns">
        <span>_</span>
        <span>□</span>
        <span>✕</span>
      </div>
    </div>

    <div class="content-panel">
      <span class="wip-icon">⧗</span>
      <p class="wip-heading">work in progress</p>
      <div class="win-hr"></div>
      <p class="wip-body">
        hardware specs, schematics, photos, and documentation<br>
        are on the way. follow the project on github for updates<br>
        or join the mailing list on the main page.
      </p>
      <div class="btn-row">
        <a href="index.html" class="win98-btn">[ ← back ]</a>
        <a href="https://github.com/iandchasse/de-link" target="_blank" class="win98-btn">[ github ]</a>
      </div>
    </div>

    <div class="statusbar">
      <span class="statusbar-field">almost ready</span>
      <span class="statusbar-field">de-link v1.0 codename PIP</span>
    </div>

  </div>

</body>
</html>
